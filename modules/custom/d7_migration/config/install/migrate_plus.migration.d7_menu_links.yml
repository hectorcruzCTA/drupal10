id: d7_menu_links
label: 'Drupal 7 Menu Links'
migration_group: d7_migration_group

source:
  plugin: menu_link
  key: drupal7
  menu_name: main-menu
  constants:
    langcode: es
  ids:
    mlid:
      type: integer

process:
  menu_name: menu_name
  link:
    plugin: menu_link_parent
    source: link_path
  title: link_title
  weight: weight
  parent:
    plugin: menu_link_parent
    source: parent
  options: options
  langcode:
    plugin: default_value
    default_value: es

destination:
  plugin: entity:menu_link_content

migration_dependencies:
  required: []
  optional: []
